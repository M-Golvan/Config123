<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Config Notepad</title>
<style>
    body{
        margin:0;
        background:#1e1e1e;
        font-family:Consolas, monospace;
        color:#d4d4d4;
    }

    .topbar{
        background:#2b2b2b;
        padding:10px 15px;
        border-bottom:1px solid #444;
        font-size:14px;
    }

    .container{
        padding:20px;
    }

    textarea{
        width:100%;
        height:85vh;
        background:#252526;
        color:#d4d4d4;
        border:none;
        outline:none;
        resize:none;
        padding:20px;
        font-size:14px;
        line-height:1.5;
        box-sizing:border-box;
    }

    button{
        margin-top:15px;
        padding:10px 18px;
        border:none;
        background:#0e639c;
        color:white;
        cursor:pointer;
        border-radius:4px;
        font-size:14px;
    }

    button:hover{
        background:#1177bb;
    }
</style>
</head>
<body>

<div class="topbar">
    Network Configuration Notes - Notepad Style
</div>

<div class="container">

<textarea id="editor">
========================
VLAN CONFIGURATION
========================

vlan 10
 name Finance

vlan 20
 name HR


========================
ETHERCHANNEL (LACP)
========================

DIST-SW1

interface range g1/0/4 - 5
 channel-group 1 mode active
 switchport mode trunk
 switchport trunk allowed vlan 10,20

interface port-channel 1
 switchport mode trunk
 switchport trunk allowed vlan 10,20


DIST-SW2

interface range g1/0/4 - 5
 channel-group 1 mode active
 switchport mode trunk
 switchport trunk allowed vlan 10,20

interface port-channel 1
 switchport mode trunk
 switchport trunk allowed vlan 10,20


========================
ACCESS PORTS & TRUNKS
========================

ACC-SW1

interface range fa0/1 - 4
 switchport access vlan 10
 switchport mode access

interface g1/0/1
 switchport trunk allowed vlan 10,20
 switchport mode trunk

interface g1/0/2
 switchport trunk allowed vlan 10,20
 switchport mode trunk


ACC-SW2

interface range fa0/1 - 3
 switchport access vlan 20
 switchport mode access

interface g1/0/1
 switchport trunk allowed vlan 10,20
 switchport mode trunk

interface g1/0/2
 switchport trunk allowed vlan 10,20
 switchport mode trunk


========================
SPANNING TREE
========================

DIST-SW1
spanning-tree vlan 10 root primary

DIST-SW2
spanning-tree vlan 20 root primary


========================
PORT SECURITY
========================

ACC-SW1

interface range fa0/1 - 4
 switchport port-security
 switchport port-security maximum 2
 switchport port-security mac-address sticky
 switchport port-security violation shutdown


ACC-SW2

interface range fa0/1 - 3
 switchport port-security
 switchport port-security maximum 2
 switchport port-security mac-address sticky
 switchport port-security violation shutdown


========================
HSRP
========================

DIST-SW1

interface vlan 10
 ip address 10.10.10.2 255.255.255.0
 standby 10 ip 10.10.10.254
 standby 10 priority 110
 standby 10 preempt

interface vlan 20
 ip address 10.10.20.2 255.255.255.0
 standby 20 ip 10.10.20.254
 standby 20 priority 100
 standby 20 preempt


DIST-SW2

interface vlan 10
 ip address 10.10.10.3 255.255.255.0
 standby 10 ip 10.10.10.254
 standby 10 priority 100
 standby 10 preempt

interface vlan 20
 ip address 10.10.20.3 255.255.255.0
 standby 20 ip 10.10.20.254
 standby 20 priority 110
 standby 20 preempt


========================
OSPF
========================

router ospf 1
 router-id 5.5.5.5

interface g1/0/1
 ip ospf 1 area 0

interface g1/0/2
 ip ospf 1 area 0


========================
VERIFY COMMANDS
========================

show spanning-tree vlan 10
show spanning-tree vlan 20

show port-security interface fa0/1

show ip ospf neighbor
show ip route ospf
show ip ospf interface brief
</textarea>

<br>

<button onclick="downloadFile()">Download TXT File</button>

</div>

<script>
function downloadFile(){
    const text = document.getElementById("editor").value;
    const blob = new Blob([text], {type: "text/plain"});
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "network-config.txt";
    link.click();
}
</script>

</body>
</html>
